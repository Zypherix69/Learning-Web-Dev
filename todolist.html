<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rishi's To-Do List</title>
  <style>
    body {
      background-color: #eeeeee;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
 
    .container {
      background-color: white;
      width: 550px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 10px;
    }
 
    h1 {
      text-align: center;
      color: #2c2c2c;
    }
 
    .task {
      background-color: #e3f0e9;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
 
    .task-title {
      font-size: 18px;
      color: #1c1c1c;
    }
 
    .task ul {
      margin-top: 10px;
    }
 
    .task a {
      color: blue;
    }
  </style>
</head>
<body>
 
  <div class="container">
 
    <h1>Rishi's To-Do List</h1>
 
    <div class="task">
      <input type="checkbox">
      <span class="task-title">Finish freeCodeCamp CSS module</span>
      <ul>
        <li><a href="https://www.freecodecamp.org/learn" target="_blank">Course link</a></li>
      </ul>
    </div>
 
    <div class="task">
      <input type="checkbox">
      <span class="task-title">Find a freelance client in Dharan</span>
      <ul>
        <li><a href="https://www.freelancer.com/" target="_blank">Client list</a></li>
      </ul>
    </div>
 
    <div class="task">
      <input type="checkbox">
      <span class="task-title">Watch Argentina's next world cup match</span>
      <ul>
        <li><a href="https://www.fifa.com/en" target="_blank">Match schedule</a></li>
      </ul>
    </div>
 
    <div class="task">
      <input type="checkbox">
      <span class="task-title">Watch Inception</span>
      <ul>
        <li><a href="https://new2.movies4u.finance/" target="_blank">Where to watch</a></li>
      </ul>
    </div>
 
  </div>
 
</body>
</html>
